<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>s3lf</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Nosifer&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --card-bg: rgba(255,255,255,0.04);
            --card-border: rgba(255,255,255,0.08);
            --surface: rgba(255,255,255,0.04);
            --surface-border: rgba(255,255,255,0.06);
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.45);
            --text-dim: rgba(255,255,255,0.25);
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            user-select: none;
            touch-action: none;
        }

        /* ── BG VIDEO ── */
        #bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        #bg-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.82) 100%);
            z-index: 1;
        }

        /* ── ENTER SCREEN ── */
        #enter-screen {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            cursor: pointer;
            transition: opacity 0.45s ease;
        }

        .enter-inner {
            text-align: center;
        }

        .enter-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.18);
            margin: 0 auto 20px;
            animation: pulse 2.4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
        }

        .enter-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.2);
        }

        /* ── MAIN LAYOUT ── */
        #main-content {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ── CARD ── */
        .card {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 32px;
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            box-shadow: 0 32px 80px -16px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);
            will-change: transform;
            transition: box-shadow 0.3s ease;
        }

        /* ── TOP ROW ── */
        .card-top {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            margin-bottom: 22px;
            text-align: center;
        }

        .pfp-wrap {
            position: relative;
            flex-shrink: 0;
        }

        .pfp {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 40px rgba(0,0,0,0.7);
        }

        .status-dot {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #3f3f3f;
            border: 2.5px solid #0a0a0a;
            transition: background 0.3s ease;
        }

        .status-dot.online  { background: #22c55e; }
        .status-dot.idle    { background: #eab308; }
        .status-dot.dnd     { background: #ef4444; }

        .card-info { width: 100%; }

        .card-name {
            font-family: 'Nosifer', cursive;
            font-size: 26px;
            font-weight: 400;
            letter-spacing: 2px;
            line-height: 1.2;
            margin-bottom: 8px;
            color: #ffffff;
            text-shadow:
                0 0 12px rgba(255,255,255,0.22),
                0 2px 24px rgba(160,100,200,0.15),
                0 4px 40px rgba(100,0,120,0.1);
        }

        .card-bio {
            font-family: 'Nosifer', cursive;
            font-size: 7px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.28);
            font-weight: 400;
        }

        /* ── DIVIDER ── */
        .divider {
            height: 1px;
            background: var(--surface-border);
            margin-bottom: 20px;
        }

        /* ── SOCIAL ICONS ── */
        .socials {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.45);
            font-size: 30px;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s ease, transform 0.18s ease;
        }

        .social-btn:hover {
            color: rgba(255,255,255,0.9);
            transform: translateY(-3px);
        }

        .social-btn img {
            width: 30px;
            height: 30px;
            object-fit: contain;
            border-radius: 0;
            pointer-events: none;
            -webkit-user-drag: none;
            opacity: 0.45;
            transition: opacity 0.2s ease, transform 0.18s ease;
        }

        .social-btn:hover img {
            opacity: 0.9;
        }

        /* ── DISCORD SECTION ── */
        .discord-box {
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 14px;
            padding: 14px 16px;
        }

        .discord-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .dc-pfp {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }

        .dc-name-row {
            display: flex;
            align-items: center;
            gap: 7px;
            flex: 1;
            min-width: 0;
        }

        .dc-username {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.85);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dc-badge {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 2px 7px;
            border-radius: 999px;
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.3);
            flex-shrink: 0;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .dc-badge.online  { background: rgba(34,197,94,0.12);  color: rgba(34,197,94,0.8); }
        .dc-badge.idle    { background: rgba(234,179,8,0.12);  color: rgba(234,179,8,0.8); }
        .dc-badge.dnd     { background: rgba(239,68,68,0.12);  color: rgba(239,68,68,0.8); }

        .dc-activity {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-left: 42px;
        }

        .dc-activity img {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .dc-activity-text { min-width: 0; }

        .dc-song {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255,255,255,0.75);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dc-artist {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 1px;
        }

        .dc-empty {
            font-size: 11px;
            color: var(--text-dim);
            padding-left: 42px;
        }

        /* ── INSTAGRAM MODAL ── */
        #insta-modal {
            position: fixed;
            inset: 0;
            z-index: 80;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.88);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
        }

        #insta-modal.show {
            opacity: 1;
            pointer-events: all;
        }

        .modal-card {
            width: 320px;
            max-width: calc(100vw - 40px);
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.85);
            transform: translateY(8px);
            transition: transform 0.35s ease;
        }

        #insta-modal.show .modal-card {
            transform: translateY(0);
        }

        .modal-card video {
            width: 100%;
            height: auto;
            display: block;
        }

        .modal-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .modal-close {
            background: none;
            border: none;
            color: rgba(255,255,255,0.35);
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s ease;
            line-height: 1;
        }

        .modal-close:hover { color: rgba(255,255,255,0.75); }

        .modal-follow {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.2px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 999px;
            padding: 8px 18px;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .modal-follow:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }

        /* ── VOLUME ── */
        #vol-wrap {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 20;
        }

        #vol-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease, color 0.2s ease;
            backdrop-filter: blur(12px);
        }

        #vol-btn:hover {
            background: rgba(255,255,255,0.09);
            color: rgba(255,255,255,0.8);
        }

        #vol-slider-wrap {
            position: absolute;
            bottom: 50px;
            right: 0;
            background: rgba(12,12,12,0.92);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 14px 16px;
            display: none;
            backdrop-filter: blur(20px);
        }

        #vol-slider {
            width: 100px;
            accent-color: rgba(255,255,255,0.8);
            cursor: pointer;
            display: block;
        }

        /* ── RIGHT-CLICK POPUP ── */
        #ctx-popup {
            position: fixed;
            z-index: 100;
            background: rgba(12,12,12,0.92);
            border: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 0.2px;
            padding: 7px 14px;
            border-radius: 999px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.96) translateY(4px);
            transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
            backdrop-filter: blur(20px);
        }

        #ctx-popup.show {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* ── MOBILE ── */
        @media (max-width: 480px) {
            .card { padding: 22px 18px; }
            .card-name { font-size: 20px; }
            .pfp { width: 100px; height: 100px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- BG -->
    <video id="bg-video" loop playsinline preload="none"></video>
    <div id="bg-overlay"></div>

    <!-- ENTER -->
    <div id="enter-screen">
        <div class="enter-inner">
            <div class="enter-dot"></div>
            <p class="enter-label">click on it or smth</p>
        </div>
    </div>

    <!-- MAIN -->
    <div id="main-content">
        <div class="card" id="card">

            <!-- Top row -->
            <div class="card-top">
                <div class="pfp-wrap">
                    <img src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHB1ZXkzcWNxNXpnb2RnNDNpZXB2Y3E0cHE4YjZ5eTJjNTZuZ2s4MiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/39QnY2Zn87LvjfZ9KZ/giphy.gif"
                         class="pfp" draggable="false" alt="s3lf">
                    <div class="status-dot" id="status-dot"></div>
                </div>
                <div class="card-info">
                    <div class="card-name">s3lf</div>
                    <div class="card-bio">social media expert</div>
                </div>
            </div>

            <div class="divider"></div>

            <!-- Socials -->
            <div class="socials">
                <a href="https://discord.com/users/396352442507198465" target="_blank" class="social-btn" title="Discord">
                    <i class="fa-brands fa-discord"></i>
                </a>
                <a href="https://www.roblox.com/users/835298548/profile" target="_blank" class="social-btn" title="Roblox">
                    <img src="https://files.catbox.moe/q4jtcq.gif" alt="Roblox">
                </a>
                <a href="#" id="insta-btn" class="social-btn" title="Instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>
            </div>

            <!-- Discord presence -->
            <div class="discord-box">
                <div class="discord-header">
                    <img id="dc-pfp" class="dc-pfp" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="">
                    <div class="dc-name-row">
                        <span id="dc-username" class="dc-username">s3lf</span>
                        <span id="dc-badge" class="dc-badge">Offline</span>
                    </div>
                </div>
                <div id="dc-activity" class="dc-empty">No current activity</div>
            </div>

        </div>
    </div>

    <!-- INSTAGRAM MODAL -->
    <div id="insta-modal">
        <div class="modal-card">
            <video id="insta-video" loop playsinline>
                <source src="https://file.garden/advUdw57_HghQzKi/shyyy%20(online-video-cutter.com).mp4" type="video/mp4">
            </video>
            <div class="modal-footer">
                <button class="modal-close" onclick="closeInsta()">✕</button>
                <a href="https://instagram.com/shy7" target="_blank" class="modal-follow">
                    <i class="fa-brands fa-instagram"></i> Follow
                </a>
            </div>
        </div>
    </div>

    <!-- VOLUME -->
    <div id="vol-wrap">
        <button id="vol-btn"><i id="vol-icon" class="fa-solid fa-volume-high"></i></button>
        <div id="vol-slider-wrap">
            <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.65">
        </div>
    </div>

    <!-- CONTEXT POPUP -->
    <div id="ctx-popup">made by <strong style="color:rgba(255,255,255,0.75);font-weight:600;">s3lf</strong></div>

    <script>
        /* ── ENTER ── */
        const enterScreen = document.getElementById('enter-screen');
        const mainContent = document.getElementById('main-content');
        const bgVideo     = document.getElementById('bg-video');
        const VIDEO_SRC   = "https://file.garden/advUdw57_HghQzKi/%D0%BA%D0%B0%D0%BA%D0%B0%D1%88%D0%BA%D0%B8.mp4";

        enterScreen.addEventListener('click', () => {
            enterScreen.style.opacity = '0';
            setTimeout(() => {
                enterScreen.style.display = 'none';
                mainContent.style.display = 'flex';
                bgVideo.src = VIDEO_SRC;
                bgVideo.volume = 0.65;
                bgVideo.play().catch(() => {});
                updateDiscord();
            }, 420);
        });

        /* ── CARD TILT ── */
        const card = document.getElementById('card');
        let tx = 0, ty = 0, cx = 0, cy = 0;

        function tiltLoop() {
            cx = cx * 0.84 + tx * 0.16;
            cy = cy * 0.84 + ty * 0.16;
            card.style.transform = `perspective(1600px) rotateX(${cx}deg) rotateY(${cy}deg)`;
            requestAnimationFrame(tiltLoop);
        }
        tiltLoop();

        card.addEventListener('mousemove', e => {
            const r = card.getBoundingClientRect();
            tx = -((e.clientY - r.top)  / r.height - 0.5) * 18;
            ty =  ((e.clientX - r.left) / r.width  - 0.5) * 22;
        });
        card.addEventListener('mouseleave', () => { tx = 0; ty = 0; });

        /* ── VOLUME ── */
        const volBtn        = document.getElementById('vol-btn');
        const volSliderWrap = document.getElementById('vol-slider-wrap');
        const volSlider     = document.getElementById('vol-slider');
        const volIcon       = document.getElementById('vol-icon');

        volBtn.addEventListener('click', () => volSliderWrap.style.display = volSliderWrap.style.display === 'block' ? 'none' : 'block');
        volSlider.addEventListener('input', () => {
            const v = parseFloat(volSlider.value);
            bgVideo.volume = v;
            volIcon.className = v === 0 ? 'fa-solid fa-volume-xmark' : v < 0.4 ? 'fa-solid fa-volume-low' : 'fa-solid fa-volume-high';
        });
        document.addEventListener('click', e => {
            if (!document.getElementById('vol-wrap').contains(e.target)) volSliderWrap.style.display = 'none';
        });

        /* ── INSTAGRAM MODAL ── */
        const instaModal = document.getElementById('insta-modal');
        const instaVideo = document.getElementById('insta-video');

        document.getElementById('insta-btn').addEventListener('click', e => {
            e.preventDefault();
            bgVideo.style.transition = 'opacity 0.3s';
            bgVideo.style.opacity = '0';
            setTimeout(() => bgVideo.pause(), 300);
            instaModal.style.display = 'flex';
            requestAnimationFrame(() => requestAnimationFrame(() => instaModal.classList.add('show')));
            instaVideo.play().catch(() => {});
        });

        function closeInsta() {
            instaModal.classList.remove('show');
            instaVideo.pause();
            setTimeout(() => {
                instaModal.style.display = 'none';
                bgVideo.style.opacity = '1';
                bgVideo.play().catch(() => {});
            }, 350);
        }

        /* ── RIGHT-CLICK ── */
        const ctxPopup = document.getElementById('ctx-popup');
        let ctxTimer;

        document.addEventListener('contextmenu', e => {
            if (window.innerWidth <= 768) return false;
            e.preventDefault();
            clearTimeout(ctxTimer);
            let l = e.clientX + 12, t = e.clientY + 12;
            if (l + 160 > window.innerWidth)  l = e.clientX - 148;
            if (t + 40  > window.innerHeight) t = e.clientY - 42;
            ctxPopup.style.left = l + 'px';
            ctxPopup.style.top  = t + 'px';
            ctxPopup.classList.add('show');
            ctxTimer = setTimeout(() => ctxPopup.classList.remove('show'), 2200);
        });

        /* ── DISCORD / LANYARD ── */
        const DISCORD_ID = '396352442507198465';

        async function updateDiscord() {
            try {
                const res  = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`, { cache: 'no-store' });
                const json = await res.json();
                if (!json.success) return;
                const d = json.data;

                const avatar = d.discord_user.avatar
                    ? `https://cdn.discordapp.com/avatars/${DISCORD_ID}/${d.discord_user.avatar}.png?size=128`
                    : 'https://cdn.discordapp.com/embed/avatars/0.png';

                document.getElementById('dc-pfp').src = avatar;
                document.getElementById('dc-username').textContent = d.discord_user.username || 's3lf';

                const status = d.discord_status || 'offline';
                const dot    = document.getElementById('status-dot');
                const badge  = document.getElementById('dc-badge');
                dot.className   = 'status-dot ' + status;
                badge.className = 'dc-badge '   + status;
                badge.textContent = status === 'dnd' ? 'DND' : status.charAt(0).toUpperCase() + status.slice(1);

                const actEl = document.getElementById('dc-activity');
                if (d.spotify) {
                    actEl.className = 'dc-activity';
                    actEl.innerHTML = `
                        <img src="${d.spotify.album_art_url}" alt="album">
                        <div class="dc-activity-text">
                            <div class="dc-song">${d.spotify.song}</div>
                            <div class="dc-artist">${d.spotify.artist}</div>
                        </div>`;
                } else if (d.activities && d.activities.length > 0) {
                    const act = d.activities.find(a => a.type !== 4) || d.activities[0];
                    actEl.className = 'dc-activity';
                    actEl.innerHTML = `<div class="dc-activity-text">
                        <div class="dc-song">${act.name}</div>
                        ${act.details ? `<div class="dc-artist">${act.details}</div>` : ''}
                    </div>`;
                } else {
                    actEl.className = 'dc-empty';
                    actEl.textContent = 'No current activity';
                }
            } catch(e) {}
        }

        setInterval(updateDiscord, 15000);
    </script>
</body>
</html>
