<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>s3lf</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Playfair+Display:wght@500;600;700&display=swap');
        :root {
            --glass-bg: rgba(15, 15, 22, 0.28);
            --glass-border: rgba(255, 255, 255, 0.10);
        }
  
        body {
            font-family: 'Inter', system_ui, sans-serif;
            user-select: none;
            min-height: 100dvh;
            overflow: hidden;
            background: #000;
            touch-action: none;
        }
  
        .title-font {
            font-family: 'Playfair Display', serif;
        }
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(26px);
            -webkit-backdrop-filter: blur(26px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -20px rgba(0, 0, 0, 0.7);
            transition: transform 0.05s linear;
        }
 
        .social-links {
            display: flex;
            gap: 30px;
            align-items: center;
            justify-content: center;
        }
 
        .social-link {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            color: rgba(255,255,255,0.8);
        }
 
        .social-link:hover {
            transform: scale(1.28);
            color: white;
        }
 
        .roblox-icon {
            width: 36px;
            height: 36px;
            object-fit: contain;
            border-radius: 8px;
            filter: brightness(1.12);
            pointer-events: none;
            -webkit-user-drag: none;
            image-rendering: crisp-edges;
            will-change: transform;
            transform: translateZ(0);
        }
 
        .main-pfp {
            width: 127px;
            height: 127px;
            border-radius: 9999px;
            object-fit: cover;
            box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.6);
            pointer-events: none;
            -webkit-user-drag: none;
        }
  
        .discord-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
        }
        .loading-dots {
            display: flex;
            align-items: center;
            gap: 4px;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            padding-left: 48px;
        }
        .loading-dots span {
            animation: dotPulse 1.4s infinite ease-in-out;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }
        .center-container {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        /* Right Click Popup - Improved Precision */
        #made-by-popup {
            position: fixed;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.85);
            padding: 7px 16px;
            border-radius: 9999px;
            font-size: 13px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            box-shadow: 0 15px 35px -10px rgba(0,0,0,0.7);
        }
        #made-by-popup.show {
            opacity: 1;
            transform: scale(1);
        }

        /* FIX FOR LONG SONG/ARTIST NAMES */
        .activity-content {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            overflow: hidden;
        }
        .activity-content img {
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
        }
        .activity-text {
            flex: 1;
            min-width: 0; /* This is the key fix */
            overflow: hidden;
        }
        .activity-text .song {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }
        .activity-text .artist {
            font-size: 12px;
            color: rgb(212 212 216);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }
    </style>
</head>
<body class="bg-black text-white overflow-hidden relative" oncontextmenu="showMadeBy(event); return false;">
    <!-- Background Video -->
    <video id="bg-video" loop playsinline preload="none" class="absolute inset-0 w-full h-full object-cover z-[-1] hidden"></video>
    <div class="absolute inset-0 bg-gradient-to-b from-transparent via-black/65 to-black/95 z-0"></div>
    <!-- Tap to Enter -->
    <div id="enter-screen" class="center-container absolute inset-0 z-50 bg-black/85 backdrop-blur-2xl cursor-pointer transition-all duration-500">
        <div class="text-center">
            <p class="enter-text">click on it or smth</p>
        </div>
    </div>
    <!-- Main Card -->
    <div id="main-content" class="center-container relative z-10 w-full hidden">
        <div id="card" class="glass rounded-3xl px-9 py-8 flex gap-8 max-w-[460px] w-full mx-auto">
            <div class="flex-shrink-0">
                <img src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExbWxzeGN3d2kzcnowY3hzYWdseTlocmVjanBwZWlxMXdpbTZ4MmpnayZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/w4kE17SKmYwhNofbey/giphy.gif"
                     class="main-pfp" draggable="false">
            </div>
       
            <div class="flex-1 min-w-0 pt-1">
                <div class="mb-6">
                    <h1 class="title-font text-5xl font-semibold tracking-[-2px]">s3lf</h1>
                    <p class="text-zinc-400 text-lg font-medium tracking-widest mt-1">social media expert</p>
                </div>
           
                <div class="social-links mb-9">
                    <a href="https://discord.com/users/396352442507198465" target="_blank" class="social-link">
                        <i class="fa-brands fa-discord text-3xl"></i>
                    </a>
                    <a href="https://www.roblox.com/users/835298548/profile" target="_blank" class="social-link">
                        <img id="roblox-icon"
                             src="https://files.catbox.moe/q4jtcq.gif"
                             alt="Roblox"
                             class="roblox-icon"
                             draggable="false"
                             loading="eager"
                             decoding="async"
                             fetchpriority="high">
                    </a>
                    <a href="https://instagram.com/shy7" target="_blank" class="social-link">
                        <i class="fa-brands fa-instagram text-3xl"></i>
                    </a>
                </div>
           
                <div id="discord-section" class="discord-section rounded-2xl p-4 text-sm">
                    <div class="flex items-center gap-3.5 mb-3">
                        <img id="dc-pfp" class="w-9 h-9 rounded-full object-cover ring-1 ring-white/20" src="https://cdn.discordapp.com/embed/avatars/0.png">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2">
                                <span id="dc-username" class="font-medium truncate">s3lf</span>
                                <span id="dc-status" class="text-[10px] px-2.5 py-px rounded bg-zinc-500/20 text-zinc-400">Offline</span>
                            </div>
                        </div>
                    </div>
                    <div id="activity" class="text-white/70 pl-12 text-[13px]">
                        <!-- Will be filled by JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Right Click Popup -->
    <div id="made-by-popup">
        made by <span class="font-medium text-white/80">s3lf</span>
    </div>
    <!-- Volume Control -->
    <div id="volume-wrapper" class="absolute bottom-6 right-6 z-20">
        <button id="volume-btn" class="bg-black/60 hover:bg-black/80 backdrop-blur-md border border-white/10 rounded-3xl p-4 transition-all active:scale-95">
            <i id="volume-icon" class="fa-solid fa-volume-high text-xl text-white/80"></i>
        </button>
        <div id="volume-slider-container" class="absolute bottom-16 right-0 bg-black/70 backdrop-blur-md border border-white/10 rounded-3xl px-5 py-4 hidden">
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.65" class="accent-white w-36 cursor-pointer">
        </div>
    </div>

    <script>
        // === Precise Right Click Popup ===
        const popup = document.getElementById('made-by-popup');
        let popupTimeout;
        function showMadeBy(e) {
            clearTimeout(popupTimeout);
            let left = e.clientX + 12;
            let top = e.clientY + 12;
            if (left + 180 > window.innerWidth) left = e.clientX - 160;
            if (top + 50 > window.innerHeight) top = e.clientY - 50;
            popup.style.left = left + 'px';
            popup.style.top = top + 'px';
          
            popup.classList.add('show');
            popupTimeout = setTimeout(() => {
                popup.classList.remove('show');
            }, 2400);
        }
        // Touch support for mobile right-click simulation (long press)
        let longPressTimer;
        document.addEventListener('touchstart', (e) => {
            longPressTimer = setTimeout(() => {
                const touch = e.touches[0];
                showMadeBy({ clientX: touch.clientX, clientY: touch.clientY });
            }, 650);
        });
        document.addEventListener('touchend', () => clearTimeout(longPressTimer));

        // 3D Tilt Effect (unchanged)
        const card = document.getElementById('card');
        let currentTiltX = 0, currentTiltY = 0;
        let targetTiltX = 0, targetTiltY = 0;
        let isDragging = false;
        function animateTilt() {
            currentTiltX = currentTiltX * 0.82 + targetTiltX * 0.18;
            currentTiltY = currentTiltY * 0.82 + targetTiltY * 0.18;
            card.style.transform = `perspective(1600px) rotateX(${currentTiltX}deg) rotateY(${currentTiltY}deg)`;
            requestAnimationFrame(animateTilt);
        }
        animateTilt();

        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width - 0.5;
            const y = (e.clientY - rect.top) / rect.height - 0.5;
            targetTiltY = x * 28;
            targetTiltX = -y * 22;
        });
        card.addEventListener('mouseleave', () => {
            targetTiltX = 0;
            targetTiltY = 0;
        });

        card.addEventListener('touchstart', (e) => { isDragging = true; }, { passive: true });
        card.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const touch = e.touches[0];
            const rect = card.getBoundingClientRect();
            const deltaX = (touch.clientX - (rect.left + rect.width/2)) / rect.width;
            const deltaY = (touch.clientY - (rect.top + rect.height/2)) / rect.height;
            targetTiltY = deltaX * 32;
            targetTiltX = -deltaY * 26;
            e.preventDefault();
        }, { passive: false });
        card.addEventListener('touchend', () => {
            isDragging = false;
            targetTiltX = 0;
            targetTiltY = 0;
        });

        // Enter Screen + Video + Volume + Discord
        const enterScreen = document.getElementById('enter-screen');
        const mainContent = document.getElementById('main-content');
        const video = document.getElementById('bg-video');
        const videoSrc = "https://file.garden/advUdw57_HghQzKi/SaveClip.App_AQPSqUFZhQat87Hui2mxwSSV12bf95R_PNksKH5ivoX6tPv1iPOloC9l7DHhdT0Ff170IiakwFmWZUBjqkUPOz10VxahigezC-52H5s.mp4";

        enterScreen.addEventListener('click', () => {
            enterScreen.style.opacity = '0';
            setTimeout(() => {
                enterScreen.classList.add('hidden');
                mainContent.classList.remove('hidden');
                video.classList.remove('hidden');
                if (!video.src) video.src = videoSrc;
                video.load();
                video.volume = 0.65;
                video.play().catch(() => {});
            }, 420);
        });

        // Volume Control (unchanged)
        const volumeBtn = document.getElementById('volume-btn');
        const sliderContainer = document.getElementById('volume-slider-container');
        const slider = document.getElementById('volume-slider');
        const volumeIcon = document.getElementById('volume-icon');
        volumeBtn.addEventListener('click', () => sliderContainer.classList.toggle('hidden'));
        slider.addEventListener('input', () => {
            video.volume = parseFloat(slider.value);
            if (slider.value == 0) volumeIcon.className = "fa-solid fa-volume-xmark text-xl text-white/80";
            else if (slider.value < 0.4) volumeIcon.className = "fa-solid fa-volume-low text-xl text-white/80";
            else volumeIcon.className = "fa-solid fa-volume-high text-xl text-white/80";
        });

        // Discord Status + Activity (updated for truncation)
        const discordId = "396352442507198465";
        const activityEl = document.getElementById('activity');

        async function updateDiscord() {
            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/${discordId}`, { cache: 'no-store' });
                const json = await res.json();
                if (!json.success || !json.data) return;

                const d = json.data;

                // Avatar & Username
                const avatarUrl = d.discord_user.avatar
                    ? `https://cdn.discordapp.com/avatars/${discordId}/${d.discord_user.avatar}.png?size=128`
                    : 'https://cdn.discordapp.com/embed/avatars/0.png';
              
                document.getElementById('dc-pfp').src = avatarUrl;
                document.getElementById('dc-username').textContent = d.discord_user.username || "s3lf";

                // Status
                let statusText = "Offline", statusClass = "bg-zinc-500/20 text-zinc-400";
                const status = d.discord_status || "offline";
                if (status === "online") { statusClass = "bg-emerald-500/20 text-emerald-400"; statusText = "Online"; }
                else if (status === "idle") { statusClass = "bg-yellow-500/20 text-yellow-400"; statusText = "Idle"; }
                else if (status === "dnd") { statusClass = "bg-red-500/20 text-red-400"; statusText = "DND"; }

                const statusEl = document.getElementById('dc-status');
                statusEl.className = `text-[10px] px-2.5 py-px rounded ${statusClass}`;
                statusEl.textContent = statusText;

                // Activity / Spotify
                let html = `<span class="text-xs text-white/60">No current activity</span>`;

                if (d.spotify) {
                    html = `
                        <div class="activity-content">
                            <img src="${d.spotify.album_art_url}" alt="album">
                            <div class="activity-text">
                                <div class="song">${d.spotify.song}</div>
                                <div class="artist">${d.spotify.artist}</div>
                            </div>
                        </div>
                    `;
                } else if (d.activities && d.activities.length > 0) {
                    const act = d.activities[0];
                    html = `<strong>${act.name}</strong>`;
                    if (act.details) html += `<br><span class="text-white/70">${act.details}</span>`;
                    if (act.state) html += `<br><span class="text-white/60">${act.state}</span>`;
                }

                activityEl.innerHTML = html;
            } catch (e) {}
        }

        window.onload = () => {
            updateDiscord();
            setInterval(updateDiscord, 15000);
        };
    </script>
</body>
</html>
