            justify-content: center;
            gap: 16px;

            width: 40px;
            height: 40px;

            align-items: center;
            justify-content: center;

            font-weight: 500;

        /* ACTIVITY OVERLAY */
        #activity-overlay {

        <div class="modal-card">
            <video id="insta-video" loop playsinline>
                <source src="https://file.garden/advUdw57_HghQzKi/shyyy%20(online-video-cutter.com).mp4">
            </video>
            <div class="modal-footer">
                <button class="modal-close" onclick="closeInsta()">✕</button>
                <a href="https://instagram.com/shy7" target="_blank" class="modal-follow">
                    <i class="fa-brands fa-instagram"></i> Follow
                </a>
            </div>
        </div>
    </div>

    <!-- ACTIVITY OVERLAY -->
    <div id="activity-overlay">
        <div class="activity-card">
            <div class="act-label">activity</div>
            <div class="act-status-row">
                <div class="act-dot" id="act-dot"></div>
                <div class="act-status-text" id="act-status-text">offline</div>
            </div>
            <div class="act-divider"></div>
            <div id="act-body"></div>
            <div class="act-close"><button class="act-close-btn" id="act-close-btn">dismiss</button></div>
        </div>
    </div>

    <!-- RIGHT-CLICK MENU -->
    <div id="ctx-menu">
        <div class="ctx-header">s3lf</div>
        <div class="ctx-divider"></div>
        <div class="ctx-item" id="ctx-copy-dc"><i class="fa-brands fa-discord"></i> Copy User ID</div>
        <div class="ctx-item" id="ctx-view-dc"><i class="fa-solid fa-satellite-dish"></i> View Activity</div>
    </div>

    <!-- VOLUME -->
    <div id="vol-wrap">
        <button id="vol-btn"><i id="vol-icon" class="fa-solid fa-volume-high"></i></button>
        <div id="vol-slider-wrap">
            <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.65">
        </div>
    </div>

    <script>
        /* ── PARTICLES ── */
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resizeCanvas() {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const COUNT = 90;
        const mouse = { x: -9999, y: -9999 };

        const pts = Array.from({ length: COUNT }, () => ({
            x:  Math.random() * window.innerWidth,
            y:  Math.random() * window.innerHeight,
            vx: (Math.random() - 0.5) * 0.25,
            vy: Math.random() * 0.35 + 0.08,
            r:  Math.random() * 1.4 + 0.4,
            o:  Math.random() * 0.35 + 0.08,
        }));

        document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        document.addEventListener('touchmove', e => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        }, { passive: true });
        document.addEventListener('touchend', () => { mouse.x = -9999; mouse.y = -9999; });

        const REPEL = 110;

        function animateParticles() {
            ctx.clearRect(0, 0, W, H);
            for (const p of pts) {
                const dx   = p.x - mouse.x;
                const dy   = p.y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < REPEL && dist > 0) {
                    const f = (REPEL - dist) / REPEL;
                    p.vx += (dx / dist) * f * 0.9;
                    p.vy += (dy / dist) * f * 0.9;
                }

                p.vx *= 0.96;
                p.vy  = p.vy * 0.96 + 0.04;

                p.x += p.vx;
                p.y += p.vy;

                if (p.y > H + 10) { p.y = -10; p.x = Math.random() * W; p.vx = (Math.random() - 0.5) * 0.25; p.vy = Math.random() * 0.35 + 0.08; }
                if (p.x < -10) p.x = W + 10;
                if (p.x > W + 10) p.x = -10;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200,210,255,${p.o})`;
                ctx.fill();
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        /* ── ENTER ── */
        const enterScreen = document.getElementById('enter-screen');
        const mainContent = document.getElementById('main-content');
        const bgAudio     = document.getElementById('bg-audio');
        enterScreen.addEventListener('click', () => {
            enterScreen.style.opacity = '0';
            setTimeout(() => {
                enterScreen.style.display = 'none';
                mainContent.style.display = 'flex';
                requestAnimationFrame(() => requestAnimationFrame(() => mainContent.classList.add('visible')));
                bgAudio.volume = 0;
                bgAudio.play().catch(() => {});
                fadeAudio(parseFloat(volSlider.value) || 0.65, 1600);
                updateDiscord();
                setTimeout(initCtxMenu, 800);
            }, 480);
        }, { once: true });

        /* ── CARD TILT / FLOAT ── */
        const card = document.getElementById('card');
        const isTouch = window.matchMedia('(hover: none) and (pointer: coarse)').matches;

        if (isTouch) {
            card.classList.add('floating');
        } else {
            let tx = 0, ty = 0, cx = 0, cy = 0;
            const MAX_X = 14, MAX_Y = 18;
            const LERP  = 0.065;

            card.style.willChange = 'transform';
            card.style.backfaceVisibility = 'hidden';

            function tiltLoop() {
                cx += (tx - cx) * LERP;
                cy += (ty - cy) * LERP;
                card.style.transform = `perspective(900px) rotateX(${cx}deg) rotateY(${cy}deg) scale3d(1.012,1.012,1.012)`;
                requestAnimationFrame(tiltLoop);
            }
            tiltLoop();

            card.addEventListener('mousemove', e => {
                const r = card.getBoundingClientRect();
                const rawX = -((e.clientY - r.top)  / r.height - 0.5) * 26;
                const rawY =  ((e.clientX - r.left) / r.width  - 0.5) * 34;
                tx = Math.max(-MAX_X, Math.min(MAX_X, rawX));
                ty = Math.max(-MAX_Y, Math.min(MAX_Y, rawY));
            });
            card.addEventListener('mouseleave', () => { tx = 0; ty = 0; });
        }

        /* ── VOLUME ── */
        const volBtn        = document.getElementById('vol-btn');
        const volSliderWrap = document.getElementById('vol-slider-wrap');
        const volSlider     = document.getElementById('vol-slider');
        const volIcon       = document.getElementById('vol-icon');

        let volAutoClose;

        function openVol() {
            volSliderWrap.classList.add('open');
            clearTimeout(volAutoClose);
            volAutoClose = setTimeout(() => volSliderWrap.classList.remove('open'), 2800);
        }

        function closeVol() {
            clearTimeout(volAutoClose);
            volSliderWrap.classList.remove('open');
        }

        volBtn.addEventListener('click', () => {
            volSliderWrap.classList.contains('open') ? closeVol() : openVol();
        });

        volSlider.addEventListener('input', () => {
            const v = parseFloat(volSlider.value);
            bgAudio.volume = v;
            volIcon.className = v === 0 ? 'fa-solid fa-volume-xmark' : v < 0.4 ? 'fa-solid fa-volume-low' : 'fa-solid fa-volume-high';
            clearTimeout(volAutoClose);
            volAutoClose = setTimeout(() => volSliderWrap.classList.remove('open'), 2800);
        });

        document.addEventListener('click', e => {
            if (!document.getElementById('vol-wrap').contains(e.target)) closeVol();
        });

        /* ── INSTAGRAM MODAL ── */
        const instaModal = document.getElementById('insta-modal');
        const instaVideo = document.getElementById('insta-video');

        let _fadeTimer = null;
        function fadeAudio(target, duration) {
            duration = duration || 380;
            clearInterval(_fadeTimer);
            const start = bgAudio.volume;
            const diff  = target - start;
            const steps = 24;
            const delay = duration / steps;
            let step = 0;
            _fadeTimer = setInterval(() => {
                step++;
                bgAudio.volume = Math.max(0, Math.min(1, start + diff * (step / steps)));
                if (step >= steps) clearInterval(_fadeTimer);
            }, delay);
        }

        document.getElementById('insta-btn').addEventListener('click', e => {
            e.preventDefault();
            instaModal.style.display = 'flex';
            requestAnimationFrame(() => requestAnimationFrame(() => instaModal.classList.add('show')));
            instaVideo.play().catch(() => {});
            fadeAudio(0);
        });

        function closeInsta() {
            instaModal.classList.remove('show');
            instaVideo.pause();
            fadeAudio(parseFloat(volSlider.value));
            setTimeout(() => { instaModal.style.display = 'none'; }, 320);
        }

        /* ── DISCORD / LANYARD ── */
        const DISCORD_ID = '396352442507198465';

        async function updateDiscord() {
            try {
                const res  = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`, { cache: 'no-store' });
                const json = await res.json();
                if (!json.success) return;
                const d      = json.data;
                const status = d.discord_status || 'offline';
                const dot    = document.getElementById('status-dot');
                dot.className = 'status-dot ' + status;
            } catch(e) {}
        }

        setInterval(updateDiscord, 15000);

        /* ── RIGHT-CLICK MENU ── */
        const ctxMenu = document.getElementById('ctx-menu');
        let ctxTimer;

        function closeCtx() {
            ctxMenu.classList.remove('show');
        }

        function initCtxMenu() {
            document.addEventListener('contextmenu', e => {
                e.preventDefault();
                clearTimeout(ctxTimer);
                closeCtx();

                const vw = window.innerWidth, vh = window.innerHeight;
                let l = e.clientX + 6, t = e.clientY + 6;
                requestAnimationFrame(() => {
                    const mw = ctxMenu.offsetWidth, mh = ctxMenu.offsetHeight;
                    if (l + mw > vw - 8) l = e.clientX - mw - 6;
                    if (t + mh > vh - 8) t = e.clientY - mh - 6;
                    ctxMenu.style.left = l + 'px';
                    ctxMenu.style.top  = t + 'px';
                    ctxMenu.classList.add('show');
                    ctxTimer = setTimeout(closeCtx, 3200);
                });
            });

            document.addEventListener('click', () => closeCtx());
            document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCtx(); });
        }

        document.addEventListener('contextmenu', e => e.preventDefault());

        document.getElementById('ctx-copy-dc').addEventListener('click', () => {
            navigator.clipboard.writeText('396352442507198465').catch(() => {});
            closeCtx();
        });

        /* ── ACTIVITY OVERLAY ── */
        const actOverlay  = document.getElementById('activity-overlay');
        const actDot      = document.getElementById('act-dot');
        const actStatusTx = document.getElementById('act-status-text');
        const actBody     = document.getElementById('act-body');

        function closeActivity() {
            actOverlay.classList.remove('show');
            setTimeout(() => { actOverlay.style.display = 'none'; }, 460);
        }

        document.getElementById('act-close-btn').addEventListener('click', closeActivity);
        actOverlay.addEventListener('click', e => { if (e.target === actOverlay) closeActivity(); });

        async function showActivity() {
            closeCtx();
            actBody.innerHTML = '<div class="act-empty">fetching…</div>';
            actDot.className  = 'act-dot';
            actStatusTx.textContent = '—';
            actOverlay.style.display = 'flex';
            requestAnimationFrame(() => requestAnimationFrame(() => actOverlay.classList.add('show')));

            try {
                const res  = await fetch(`https://api.lanyard.rest/v1/users/396352442507198465`, { cache: 'no-store' });
                const json = await res.json();
                if (!json.success) throw new Error();

                const d      = json.data;
                const status = d.discord_status || 'offline';
                const labels = { online: 'online', idle: 'idle', dnd: 'do not disturb', offline: 'offline' };

                actDot.className      = 'act-dot ' + status;
                actStatusTx.textContent = labels[status] || status;

                const acts   = d.activities || [];
                const custom = acts.find(a => a.type === 4);
                const nonSpotifyAct = acts.find(a => a.type !== 4 && a.name !== 'Spotify') || null;

                let html = '';

                if (custom && custom.state) {
                    html += `<div class="act-row" style="margin-bottom:${(d.spotify || nonSpotifyAct) ? '10px' : '0'}">
                        <div class="act-icon-placeholder"><i class="fa-regular fa-comment"></i></div>
                        <div class="act-info">
                            <div class="act-detail" style="font-style:italic;">"${custom.state}"</div>
                        </div>
                    </div>`;
                }

                if (d.spotify) {
                    const rawArt = d.spotify.album_art_url || '';
                    const artSrc = rawArt ? `https://wsrv.nl/?url=${encodeURIComponent(rawArt)}&w=68&h=68&output=jpg` : '';
                    html += `<div class="act-row">
                        ${artSrc
                            ? `<img class="act-icon" src="${artSrc}" alt="" referrerpolicy="no-referrer" crossorigin="anonymous" onerror="this.outerHTML='<div class=\\'act-icon-placeholder\\'><i class=\\'fa-solid fa-music\\'></i></div>'">`
                            : `<div class="act-icon-placeholder"><i class="fa-solid fa-music"></i></div>`
                        }
                        <div class="act-info">
                            <div class="act-name">Spotify</div>
                            <div class="act-detail">${d.spotify.song}</div>
                            <div class="act-detail" style="opacity:0.6">${d.spotify.artist}</div>
                        </div>
                    </div>`;
                } else if (nonSpotifyAct) {
                    let imgUrl = null;
                    const li = nonSpotifyAct.assets?.large_image || '';
                    if (li.startsWith('mp:')) {
                        imgUrl = 'https://media.discordapp.net/' + li.replace('mp:', '');
                    } else if (li && !li.startsWith('spotify:')) {
                        imgUrl = `https://cdn.discordapp.com/app-assets/${nonSpotifyAct.application_id}/${li}.png`;
                    }

                    const iconHtml = imgUrl
                        ? `<img class="act-icon" src="${imgUrl}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="act-icon-placeholder" style="display:none"><i class="fa-solid fa-gamepad"></i></div>`
                        : `<div class="act-icon-placeholder"><i class="fa-solid fa-gamepad"></i></div>`;

                    html += `<div class="act-row">
                        ${iconHtml}
                        <div class="act-info">
                            <div class="act-name">${nonSpotifyAct.name}</div>
                            ${nonSpotifyAct.details ? `<div class="act-detail">${nonSpotifyAct.details}</div>` : ''}
                            ${nonSpotifyAct.state   ? `<div class="act-detail">${nonSpotifyAct.state}</div>`   : ''}
                        </div>
                    </div>`;
                }

                if (!html) html = '<div class="act-empty">nothing going on</div>';
                actBody.innerHTML = html;

            } catch(e) {
                actBody.innerHTML = '<div class="act-empty">couldn\'t load</div>';
            }
        }

        document.getElementById('ctx-view-dc').addEventListener('click', showActivity);

        /* ── TITLE ANIMATION ── */
        (function() {
            const word = 'spoiled';
            let i = 0, deleting = false, away = false, tid;

            function tick() {
                if (away) return;
                const base = word.slice(0, i);
                document.title = base.length === 0 ? '\u00B7' : base + (i % 2 === 0 && !deleting ? '|' : '');
                if (!deleting) {
                    if (i < word.length) { i++; tid = setTimeout(tick, 110); }
                    else { deleting = true; tid = setTimeout(tick, 1400); }
                } else {
                    if (i > 0) { i--; tid = setTimeout(tick, 70); }
                    else { deleting = false; tid = setTimeout(tick, 500); }
                }
            }

            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    away = true;
                    clearTimeout(tid);
                    document.title = 'yearning';
                } else {
                    away = false;
                    tick();
                }
            });

            tick();
        })();

        /* ── CURSOR TRAIL ── */
        (function() {
            if (window.matchMedia('(hover: none) and (pointer: coarse)').matches) return;

            const TRAIL_LEN = 18;
            const trail = [];

            for (let i = 0; i < TRAIL_LEN; i++) {
                const dot = document.createElement('div');
                const size = Math.max(2, 5 - i * 0.18);
                dot.style.cssText = `
                    position: fixed;
                    border-radius: 50%;
                    pointer-events: none;
                    z-index: 9999;
                    width: ${size}px;
                    height: ${size}px;
                    background: rgba(255,255,255,${0.55 - i * 0.028});
                    transform: translate(-50%, -50%);
                    transition: opacity 0.12s ease;
                    will-change: transform;
                    left: -999px; top: -999px;
                `;
                document.body.appendChild(dot);
                trail.push({ el: dot, x: -999, y: -999 });
            }

            let mx = -999, my = -999;
            document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

            function trailLoop() {
                let px = mx, py = my;
                for (let i = 0; i < TRAIL_LEN; i++) {
                    const t = trail[i];
                    t.x += (px - t.x) * (0.45 - i * 0.018);
                    t.y += (py - t.y) * (0.45 - i * 0.018);
                    t.el.style.left = t.x + 'px';
                    t.el.style.top  = t.y + 'px';
                    px = t.x; py = t.y;
                }
                requestAnimationFrame(trailLoop);
            }
            trailLoop();
        })();
    </script>
</body>
</html>
